pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = new File(rootDir, 'local.properties')
        if (!localPropertiesFile.exists()) {
            throw new GradleException('local.properties is missing. Run flutter pub get or flutter create . --platforms=android to regenerate it.')
        }
        localPropertiesFile.withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty('flutter.sdk')
        if (flutterSdkPath == null) {
            throw new GradleException('flutter.sdk is not set in local.properties.')
        }
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id 'dev.flutter.flutter-plugin-loader' version '1.0.0'
    id 'com.android.application' version '8.3.2' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
}

include ':app'
